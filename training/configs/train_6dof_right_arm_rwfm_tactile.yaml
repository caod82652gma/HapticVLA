# ============================================================================
# RWFM right arm 6-DOF + tactile training config
# Train from SmolVLA base with RWFM reward weighting + anchor regularization.
# Datasets: egg + marmalade_jar + waffles (12V clean) + crack variants.
# Action/state: right arm only [6-11].
# ============================================================================

experiment:
  name: "crab_smolvla_6dof_right_arm_rwfm_tactile"
  seed: 42
  output_dir: "outputs/crab_smolvla_6dof_right_arm_rwfm_tactile"
  resume_from_checkpoint: null

model:
  pretrained_path: "lerobot/smolvla_base"
  chunk_size: 50
  n_action_steps: 50
  max_state_dim: 32
  max_action_dim: 32
  action_dim: 6
  state_dim: 6
  num_steps: 10
  freeze_vision_encoder: true
  train_expert_only: true
  train_state_proj: true
  tactile_encoder:
    enabled: true
    input_dim: 100
    hidden_dim: 128
    output_dim: 64
    num_layers: 2
    activation: "gelu"
    dropout: 0.1

dataset:
  episodes_dir: "/home/anywherevla/crab/datasets"
  episode_names:
    # --- Egg 12V (11 datasets, Feb 17-19 + Feb 26) ---
    - "egg_carton_to_tray/pick_place_soft_20260217_1847"
    - "egg_carton_to_tray/pick_place_soft_20260217_1905"
    - "egg_carton_to_tray/pick_place_soft_20260217_2003"
    - "egg_carton_to_tray/pick_place_soft_20260217_2020"
    - "egg_carton_to_tray/pick_place_soft_20260218_1414"
    - "egg_carton_to_tray/pick_place_soft_20260218_1422"
    - "egg_carton_to_tray/pick_place_soft_20260218_1429"
    - "egg_carton_to_tray/pick_place_soft_20260218_1446"
    - "egg_carton_to_tray/pick_place_soft_20260219_1759"
    - "egg_carton_to_tray/pick_place_medium_20260226_1638"
    - "egg_carton_to_tray/pick_place_medium_20260226_1649"
    # --- Marmalade jar clean (7 datasets, Feb 26-27) ---
    - "marmalade_jar/pick_place_medium_20260226_1659"
    - "marmalade_jar/pick_place_medium_20260226_1707"
    - "marmalade_jar/pick_place_medium_20260226_1713_2"
    - "marmalade_jar/pick_place_medium_20260226_1717"
    - "marmalade_jar/pick_place_medium_20260226_1722"
    - "marmalade_jar/pick_place_medium_20260227_1636"
    - "marmalade_jar/pick_place_medium_20260227_1641"
    # --- Waffles clean (9 datasets, Feb 26-27) ---
    - "waffles/pick_place_soft_20260226_1727"
    - "waffles/pick_place_soft_20260226_1734"
    - "waffles/pick_place_soft_20260226_1738"
    - "waffles/pick_place_soft_20260226_1743"
    - "waffles/pick_place_soft_20260226_1748"
    - "waffles/pick_place_soft_20260227_1507"
    - "waffles/pick_place_soft_20260227_1611"
    - "waffles/pick_place_soft_20260227_1616"
    - "waffles/pick_place_soft_20260227_1621"
    # --- Egg cracked (3 datasets, negative reward signal) ---
    - "egg_carton_to_tray_cracked/pick_place_soft_20260219_1820"
    - "egg_carton_to_tray_cracked/pick_place_soft_20260219_1831"
    - "egg_carton_to_tray_cracked/pick_place_soft_20260219_1839"
    # --- Marmalade jar crack (2 datasets, negative reward signal) ---
    - "marmalade_jar_crack/pick_place_medium_20260227_1643"
    - "marmalade_jar_crack/pick_place_medium_20260227_1648"
    # --- Waffles crack (2 datasets, negative reward signal) ---
    - "waffles_crack/pick_place_soft_20260227_1627"
    - "waffles_crack/pick_place_soft_20260227_1633"
  action_indices: [6, 7, 8, 9, 10, 11]
  state_indices: [6, 7, 8, 9, 10, 11]
  image_keys:
    - "observation.images.main_camera"
    - "observation.images.left_arm_camera"
    - "observation.images.right_arm_camera"
  fps: 15
  image_size: [256, 256]
  original_image_size: [480, 640]
  video_codec: "av1"
  task_description: "Pick and place the object"
  val_ratio: 0.1
  num_workers: 0
  video_cache_dir: "/tmp/crab_video_cache"

training:
  batch_size: 8
  gradient_accumulation_steps: 2
  steps: 50000
  warmup_steps: 2000
  optimizer: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-10
  betas: [0.9, 0.95]
  eps: 1.0e-8
  grad_clip_norm: 10.0
  scheduler: "cosine_with_warmup"
  decay_steps: 50000
  min_lr: 2.5e-6
  use_amp: true
  amp_dtype: "bfloat16"
  checkpoint:
    save_every_steps: 5000
    keep_last_n: 5
    save_optimizer: true
    save_best: true
  log_every_steps: 50
  eval_every_steps: 2500
  visualize_every_steps: 1000

reward_weighting:
  enabled: true
  alpha: 0.25
  alpha_warmup_steps: 1000
  alpha_ramp_steps: 3000
  w_min: 0.25
  w_max: 4.0
  mix_beta: 0.7
  z_clip: 6.0
  a_clip: 6.0
  group_key: "task"
  eps: 1.0e-6
  stats_path: "docs/reward_weighting_stats_cycle1_with_cracked.json"

anchor:
  enabled: true
  lambda: 1.0e-4
  warmup_steps: 2000
  ramp_steps: 6000
  trainable_only: true
  reference_device: "cpu"
